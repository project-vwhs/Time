<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley-Wide Health Systems Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .fade-transition {
            transition: opacity 0.5s ease-in-out;
        }
        /* Ensure the container maintains a solid structure */
        .image-container {
            aspect-ratio: 16/9;
            min-height: 400px;
            max-height: 75vh;
        }
        @media (max-width: 640px) {
            .image-container {
                aspect-ratio: 4/3;
                min-height: 300px;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800 text-center md:text-left">
                Valley-Wide Health Systems Timeline
            </h1>
            <p class="text-slate-500 font-medium mt-2 md:mt-0">1976 — 2023</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-8 w-full">
        <div class="w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 flex flex-col">
            
            <!-- Slideshow Container -->
            <div class="relative bg-slate-100 w-full image-container flex items-center justify-center group overflow-hidden">
                
                <!-- Loading Indicator -->
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-slate-100 z-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>

                <!-- Error Fallback Message -->
                <div id="error-message" class="absolute inset-0 flex-col items-center justify-center bg-slate-100 z-20 hidden p-6 text-center">
                    <svg class="w-16 h-16 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p class="text-lg font-semibold text-slate-700">Image failed to load</p>
                    <p class="text-sm text-slate-500 mt-2 mb-4">Google Drive permissions may be blocking direct embedding.</p>
                    <a id="direct-link" href="#" target="_blank" class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors shadow font-medium">
                        Open Map in New Tab
                    </a>
                </div>

                <!-- Main Image -->
                <img id="slide-image" class="w-full h-full object-contain fade-transition opacity-0" src="" alt="Timeline Map">
                
                <!-- Year Overlay Badge -->
                <div class="absolute top-4 sm:top-6 left-4 sm:left-6 bg-blue-600 text-white px-4 py-2 sm:px-6 sm:py-3 rounded-xl shadow-lg font-bold text-xl sm:text-3xl tracking-wider transition-all transform z-10">
                    <span id="slide-year">----</span>
                </div>

                <!-- Previous Arrow -->
                <button onclick="prevSlide()" class="absolute left-2 sm:left-4 p-2 sm:p-3 rounded-full bg-white/90 hover:bg-white text-slate-800 shadow-lg transform -translate-y-1/2 top-1/2 opacity-0 group-hover:opacity-100 transition duration-300 focus:outline-none focus:ring-4 focus:ring-blue-500/50 z-10" aria-label="Previous image">
                    <svg class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>

                <!-- Next Arrow -->
                <button onclick="nextSlide()" class="absolute right-2 sm:right-4 p-2 sm:p-3 rounded-full bg-white/90 hover:bg-white text-slate-800 shadow-lg transform -translate-y-1/2 top-1/2 opacity-0 group-hover:opacity-100 transition duration-300 focus:outline-none focus:ring-4 focus:ring-blue-500/50 z-10" aria-label="Next image">
                    <svg class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>

            </div>

            <!-- Controls and Progress (Fixed Layout using Grid) -->
            <div class="p-4 sm:p-6 bg-white grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                
                <!-- Play/Pause Button -->
                <div class="flex justify-center md:justify-start">
                    <button id="play-pause-btn" onclick="togglePlay()" class="flex items-center gap-2 px-6 py-3 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 whitespace-nowrap w-full md:w-auto justify-center">
                        <svg id="play-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                        </svg>
                        <svg id="pause-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                        <span id="play-pause-text">Pause Slideshow</span>
                    </button>
                </div>

                <!-- Progress Tracker / Timeline Dots -->
                <div class="flex justify-center flex-wrap gap-2 md:gap-3" id="dots-container">
                    <!-- Dots will be generated here -->
                </div>

                <!-- Slide Counter -->
                <div class="flex justify-center md:justify-end text-sm font-medium text-slate-500 tabular-nums whitespace-nowrap">
                    Slide <span id="current-slide-num">1</span> of <span id="total-slide-num">13</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center p-6 text-slate-500 text-sm">
        <p>Interactive Service Area Timeline. Images loaded directly from Google Drive.</p>
    </footer>

    <script>
        // Slides data sorted chronologically
        const slides = [
            { year: 1976, id: '1bRa-ksIPrJMWVkIgLQWEJfJTv2wobkK3' },
            { year: 1977, id: '1alm6pIJ4YlK3EhoDSeKF8st28Tolw8hB' },
            { year: 1983, id: '1c-47cxTxZnmnKNorZxeDVsqHU_QBaNbH' },
            { year: 1988, id: '13RpXva0p6Fz7hbRkYU1XMAWB4Sy1I6w5' },
            { year: 1993, id: '1XNqSpmI1bz0RlxLT_3NJxVv4oqjnzqwH' },
            { year: 1995, id: '1dZhILuR65w3Md5YxX4FRTm1NXRBnRiet' },
            { year: 1996, id: '196sXBAEAK2dyB2W9TKaXNO9qEOhVVxiO' },
            { year: 1997, id: '1-vGIIAhNlNLm0_uyXLPxBfLB66gyo-e7' },
            { year: 1998, id: '1hO6-m2midxrsqXJl0Kmq9vzfGhNQvx3o' },
            { year: 2008, id: '1p5qs8ipIEMkqcy_BAHOFtJpoZeG2nI2S' },
            { year: 2019, id: '1ejnKYfcRw2SeP5vhvzqOPA6oVDtKPoSX' },
            { year: 2020, id: '1Kr7Kb89quEgYs_VNAWjLwUhygOf_49iH' },
            { year: 2023, id: '1CHkHOprSJ_a8IzM9tMBAh5SLwAlEaESq' }
        ].map(slide => ({
            year: slide.year,
            // Using Google's image delivery network (lh3) which is highly reliable for embedding Drive photos
            url: `https://lh3.googleusercontent.com/d/${slide.id}`,
            originalDriveLink: `https://drive.google.com/file/d/${slide.id}/view?usp=sharing`
        }));

        let currentIndex = 0;
        let isPlaying = true;
        let slideInterval;
        const intervalTime = 4000; // 4 seconds per slide

        const imageElement = document.getElementById('slide-image');
        const yearElement = document.getElementById('slide-year');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('error-message');
        const directLink = document.getElementById('direct-link');
        const currentNumEl = document.getElementById('current-slide-num');
        const totalNumEl = document.getElementById('total-slide-num');
        const dotsContainer = document.getElementById('dots-container');
        
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playPauseText = document.getElementById('play-pause-text');

        // Initialize setup
        function init() {
            totalNumEl.textContent = slides.length;
            
            // Generate dot indicators
            slides.forEach((slide, index) => {
                const dot = document.createElement('button');
                dot.className = `w-3 h-3 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 ${index === 0 ? 'bg-blue-600 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`;
                dot.setAttribute('aria-label', `Go to slide ${slide.year}`);
                dot.onclick = () => jumpToSlide(index);
                dotsContainer.appendChild(dot);
            });

            // Show first slide
            renderSlide();
            
            // Start autoplay
            startSlideshow();
        }

        function renderSlide() {
            const slide = slides[currentIndex];
            
            // Fade out current image and show loader
            imageElement.classList.remove('opacity-100');
            imageElement.classList.add('opacity-0');
            errorMessage.style.display = 'none';
            loader.style.display = 'flex';
            
            // Wait a brief moment for fade out animation
            setTimeout(() => {
                yearElement.textContent = slide.year;
                currentNumEl.textContent = currentIndex + 1;
                updateDots();
                
                // Set handlers before setting source
                imageElement.onload = () => {
                    loader.style.display = 'none';
                    errorMessage.style.display = 'none';
                    imageElement.classList.remove('opacity-0');
                    imageElement.classList.add('opacity-100');
                };

                // Fallback if the direct embed fails (e.g. strict Drive permissions)
                imageElement.onerror = () => {
                    loader.style.display = 'none';
                    imageElement.classList.remove('opacity-100');
                    imageElement.classList.add('opacity-0');
                    errorMessage.style.display = 'flex';
                    directLink.href = slide.originalDriveLink;
                    
                    // Stop slideshow if an error occurs so the user has time to click the link
                    if(isPlaying) togglePlay(); 
                };
                
                // Trigger the image load
                imageElement.src = slide.url;
            }, 300);
        }

        function updateDots() {
            const dots = dotsContainer.children;
            for (let i = 0; i < dots.length; i++) {
                if (i === currentIndex) {
                    dots[i].className = 'w-3 h-3 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-blue-600 scale-125';
                } else {
                    dots[i].className = 'w-3 h-3 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-300 hover:bg-slate-400';
                }
            }
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            renderSlide();
            resetInterval();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            renderSlide();
            resetInterval();
        }

        function jumpToSlide(index) {
            currentIndex = index;
            renderSlide();
            resetInterval();
        }

        function togglePlay() {
            if (isPlaying) {
                stopSlideshow();
            } else {
                // Remove error message if trying to play again
                errorMessage.style.display = 'none';
                startSlideshow();
                nextSlide(); 
            }
            updatePlayButtonUI();
        }

        function startSlideshow() {
            isPlaying = true;
            slideInterval = setInterval(nextSlide, intervalTime);
        }

        function stopSlideshow() {
            isPlaying = false;
            clearInterval(slideInterval);
        }

        function resetInterval() {
            if (isPlaying) {
                clearInterval(slideInterval);
                slideInterval = setInterval(nextSlide, intervalTime);
            }
        }

        function updatePlayButtonUI() {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                playPauseText.textContent = "Pause Slideshow";
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                playPauseText.textContent = "Play Slideshow";
            }
        }

        // Add keyboard support for navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Initialize when DOM is ready
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
